<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkraft</title>
    <style>
        @font-face {
            font-family: "Matter Regular";
            src: url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.eot");
            src: url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.eot?#iefix")format("embedded-opentype"),
                url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.woff2")format("woff2"),
                url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.woff")format("woff"),
                url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.ttf")format("truetype"),
                url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.svg#Matter Regular")format("svg");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Matter Regular", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            padding: 18px 48px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #000000;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.875rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        /* Subtle drawing related decorative element */
        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.03;
        }

        .decoration svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="decoration">
        <svg viewBox="0 0 800 600" preserveAspectRatio="none">
            <path d="M100,100 C200,50 400,150 500,100 S700,50 750,200" stroke="black" stroke-width="2" fill="none" />
            <path d="M50,400 C150,450 350,350 450,400 S650,450 700,300" stroke="black" stroke-width="2" fill="none" />
        </svg>
    </div>

    <div class="container">
        <h1>Inkraft</h1>
        <p>A fault-tolerant, real-time distributed drawing board powered by the Raft consensus algorithm.</p>
        <a href="/board.html" class="btn">Launch Board</a>
    </div>

    <div class="footer">
        BUILT FOR DISTRIBUTED RESILIENCE
    </div>
</body>

</html>
