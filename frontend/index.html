<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkraft — Distributed Drawing Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 16px 24px;
            background: #16213e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e94560;
            transition: background 0.3s;
        }
        .status-dot.connected { background: #4ecca3; }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            width: 100%;
        }
        .toolbar label {
            font-size: 0.8rem;
            color: #a0a0b0;
        }
        .toolbar input[type="color"] {
            width: 36px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }
        .toolbar input[type="range"] {
            width: 100px;
            accent-color: #e94560;
        }
        .toolbar .width-val {
            font-size: 0.8rem;
            color: #e94560;
            min-width: 24px;
        }
        .toolbar button {
            padding: 6px 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .toolbar button:hover { background: #c73650; }
        .canvas-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            width: 100%;
        }
        canvas {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            cursor: crosshair;
            max-width: 100%;
        }
        footer {
            padding: 8px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Inkraft</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </header>

    <div class="toolbar">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#000000">
        <label>Width</label>
        <input type="range" id="widthSlider" min="1" max="20" value="3">
        <span class="width-val" id="widthVal">3</span>
        <button id="clearBtn">Clear</button>
    </div>

    <div class="canvas-wrap">
        <canvas id="board" width="1000" height="600"></canvas>
    </div>

    <footer>Distributed real-time drawing board powered by Raft consensus</footer>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const colorPicker = document.getElementById('colorPicker');
        const widthSlider = document.getElementById('widthSlider');
        const widthVal = document.getElementById('widthVal');
        const clearBtn = document.getElementById('clearBtn');

        let drawing = false;
        let lastX = 0, lastY = 0;
        let ws = null;

        widthSlider.addEventListener('input', () => {
            widthVal.textContent = widthSlider.value;
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        function drawLine(x0, y0, x1, y1, color, width) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
            };

            ws.onclose = () => {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected — reconnecting...';
                setTimeout(connect, 1000);
            };

            ws.onerror = () => {
                ws.close();
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'stroke') {
                    drawLine(msg.x0, msg.y0, msg.x1, msg.y1, msg.color, msg.width);
                } else if (msg.type === 'connected') {
                    statusText.textContent = msg.message;
                } else if (msg.type === 'leader_changed') {
                    statusText.textContent = `Leader: ${msg.leader}`;
                }
            };
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const pos = getPos(e);
            const stroke = {
                type: 'stroke',
                x0: lastX, y0: lastY,
                x1: pos.x, y1: pos.y,
                color: colorPicker.value,
                width: parseFloat(widthSlider.value)
            };

            // Draw locally for immediate feedback
            drawLine(stroke.x0, stroke.y0, stroke.x1, stroke.y1, stroke.color, stroke.width);

            // Send to gateway
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(stroke));
            }

            lastX = pos.x;
            lastY = pos.y;
        });

        canvas.addEventListener('mouseup', () => { drawing = false; });
        canvas.addEventListener('mouseleave', () => { drawing = false; });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            drawing = true;
            const touch = e.touches[0];
            const pos = getPos(touch);
            lastX = pos.x;
            lastY = pos.y;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!drawing) return;
            const touch = e.touches[0];
            const pos = getPos(touch);
            const stroke = {
                type: 'stroke',
                x0: lastX, y0: lastY,
                x1: pos.x, y1: pos.y,
                color: colorPicker.value,
                width: parseFloat(widthSlider.value)
            };
            drawLine(stroke.x0, stroke.y0, stroke.x1, stroke.y1, stroke.color, stroke.width);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(stroke));
            }
            lastX = pos.x;
            lastY = pos.y;
        });

        canvas.addEventListener('touchend', () => { drawing = false; });

        connect();
    </script>
</body>
</html>
