<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkraft | Board</title>
    <style>
        @font-face {
            font-family: "Matter Regular";
            src: url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.eot");
            src: url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.eot?#iefix")format("embedded-opentype"),
            url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.woff2")format("woff2"),
            url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.woff")format("woff"),
            url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.ttf")format("truetype"),
            url("https://db.onlinewebfonts.com/t/f56809563b15c7c76669dac9ca9d38ac.svg#Matter Regular")format("svg");
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Matter Regular", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ---- Toolbar ---- */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 0 32px;
            background: #fff;
            border-bottom: 1px solid #eeeeee;
            flex-shrink: 0;
            height: 64px;
        }

        .toolbar .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #000;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .toolbar .sep {
            width: 1px;
            height: 24px;
            background: #eeeeee;
        }

        /* Color swatches */
        .colors { display: flex; gap: 8px; }
        .colors .swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }
        .colors .swatch:hover { transform: scale(1.1); }
        .colors .swatch.active { border: 2px solid #000; transform: scale(1.1); }

        /* Width slider */
        .width-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .width-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .width-group input[type="range"] {
            width: 100px;
            accent-color: #000;
            cursor: pointer;
        }
        .width-group .val {
            font-size: 0.75rem;
            color: #000;
            min-width: 20px;
            text-align: center;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            background: #000;
            color: #fff;
            border: 1px solid #000;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:hover { background: #fff; color: #000; }

        .spacer { flex: 1; }

        /* Status */
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .status-dot.green  { background: #000; }
        .status-dot.yellow { background: #999; }
        .status-dot.red    { background: #eee; border: 1px solid #ccc; }

        /* ---- Canvas ---- */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #fafafa;
        }

        canvas {
            background: #fff;
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #efefef;
        }

        /* Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .overlay .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #eee;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .overlay p { font-size: 0.875rem; color: #000; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="toolbar">
    <span class="brand" onclick="location.href='/'">Inkraft</span>
    <div class="sep"></div>

    <div class="colors" id="colorPalette"></div>
    <div class="sep"></div>

    <div class="width-group">
        <label>Width</label>
        <input type="range" id="widthSlider" min="1" max="20" value="3">
        <span class="val" id="widthVal">3</span>
    </div>

    <div class="sep"></div>
    <button class="btn" id="clearBtn">Clear</button>

    <span class="spacer"></span>

    <div class="status">
        <div class="status-dot red" id="statusDot"></div>
        <span id="statusText">Connecting…</span>
    </div>
</div>

<div class="canvas-area">
    <canvas id="board" width="1000" height="700"></canvas>
    <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <p>Reconnecting to Inkraft…</p>
    </div>
</div>

<script>
(function () {
    "use strict";

    const COLORS = ["#000000","#333333","#666666","#999999","#cccccc","#eeeeee"];
    const RECONNECT_MS = 1500;

    const canvas     = document.getElementById("board");
    const ctx        = canvas.getContext("2d");
    const statusDot  = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const widthSlider= document.getElementById("widthSlider");
    const widthVal   = document.getElementById("widthVal");
    const clearBtn   = document.getElementById("clearBtn");
    const overlay    = document.getElementById("overlay");
    const palette    = document.getElementById("colorPalette");

    let ws = null, drawing = false, lastX = 0, lastY = 0;
    let selectedColor = COLORS[0], selectedWidth = 3;
    const renderedIndices = new Set();
    let strokeHistory = [];

    // Build palette
    COLORS.forEach((c, i) => {
        const el = document.createElement("div");
        el.className = "swatch" + (i === 0 ? " active" : "");
        el.style.background = c;
        el.addEventListener("click", () => {
            palette.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
            selectedColor = c;
        });
        palette.appendChild(el);
    });

    widthSlider.addEventListener("input", () => {
        selectedWidth = parseInt(widthSlider.value, 10);
        widthVal.textContent = selectedWidth;
    });

    clearBtn.addEventListener("click", () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "clear" }));
        }
    });

    function drawLine(x0, y0, x1, y1, color, width) {
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
    }

    function replayHistory(strokes) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderedIndices.clear();
        strokeHistory = [];
        for (const s of strokes) {
            if (s.type === "clear") {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                strokeHistory = [];
                continue;
            }
            drawLine(s.x0, s.y0, s.x1, s.y1, s.color, s.width);
            strokeHistory.push(s);
            if (s.index !== undefined) renderedIndices.add(s.index);
        }
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
    }
    function getTouchPos(e) {
        const t = e.touches[0], r = canvas.getBoundingClientRect();
        return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
    }

    canvas.addEventListener("mousedown", e => { drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; });
    canvas.addEventListener("mousemove", e => { if (!drawing) return; const p = getPos(e); sendStroke(lastX, lastY, p.x, p.y); lastX = p.x; lastY = p.y; });
    canvas.addEventListener("mouseup", () => { drawing = false; });
    canvas.addEventListener("mouseleave", () => { drawing = false; });

    canvas.addEventListener("touchstart", e => { e.preventDefault(); drawing = true; const p = getTouchPos(e); lastX = p.x; lastY = p.y; });
    canvas.addEventListener("touchmove", e => { e.preventDefault(); if (!drawing) return; const p = getTouchPos(e); sendStroke(lastX, lastY, p.x, p.y); lastX = p.x; lastY = p.y; });
    canvas.addEventListener("touchend", () => { drawing = false; });
    canvas.addEventListener("touchcancel", () => { drawing = false; });

    function sendStroke(x0, y0, x1, y1) {
        drawLine(x0, y0, x1, y1, selectedColor, selectedWidth);
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "stroke", x0, y0, x1, y1, color: selectedColor, width: selectedWidth }));
        }
    }

    function setStatus(state, text) {
        statusDot.className = "status-dot " + state;
        statusText.textContent = text;
    }

    function connect() {
        // Automatically detect if we are on Vercel (production) or local
        const isVercel = window.location.hostname.includes("vercel") || window.location.hostname.includes("inkraft");
        const backendHost = isVercel ? "inkraft.harshithj.me" : window.location.host;
        
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(proto + "//" + backendHost + "/ws");

        ws.onopen = () => {
            document.getElementById("overlay").classList.remove("visible");
            setStatus("green", "Online");
            ws.send(JSON.stringify({ type: "get_history" }));
        };
        ws.onclose = () => {
            setStatus("yellow", "Offline");
            document.getElementById("overlay").classList.add("visible");
            setTimeout(connect, RECONNECT_MS);
        };
        ws.onerror = () => { ws.close(); };

        ws.onmessage = e => {
            const msg = JSON.parse(e.data);
            switch (msg.type) {
                case "leader_changed":
                    setStatus("green", "Leader: " + msg.leader);
                    break;
                case "no_leader":
                    setStatus("yellow", "Consensus Error");
                    break;
                case "stroke":
                    if (msg.index !== undefined && renderedIndices.has(msg.index)) break;
                    if (msg.index !== undefined) renderedIndices.add(msg.index);
                    drawLine(msg.x0, msg.y0, msg.x1, msg.y1, msg.color, msg.width);
                    strokeHistory.push(msg);
                    break;
                case "clear":
                    if (msg.index !== undefined && renderedIndices.has(msg.index)) break;
                    if (msg.index !== undefined) renderedIndices.add(msg.index);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    strokeHistory = [];
                    break;
                case "history":
                    if (msg.strokes) replayHistory(msg.strokes);
                    break;
            }
        };
    }

    connect();
})();
</script>
</body>
</html>
