version: '3.8'

networks:
  inkraft-net:
    driver: bridge

services:
  replica1:
    build:
      context: ./replica1
    container_name: inkraft-replica1
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REPLICA_ID=1
      - PORT=8001
      - PEERS=http://replica2:8002,http://replica3:8003
      - GATEWAY_URL=http://gateway:9000
    volumes:
      - ./replica1:/app
    networks:
      - inkraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  replica2:
    build:
      context: ./replica2
    container_name: inkraft-replica2
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - REPLICA_ID=2
      - PORT=8002
      - PEERS=http://replica1:8001,http://replica3:8003
      - GATEWAY_URL=http://gateway:9000
    volumes:
      - ./replica2:/app
    networks:
      - inkraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  replica3:
    build:
      context: ./replica3
    container_name: inkraft-replica3
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - REPLICA_ID=3
      - PORT=8003
      - PEERS=http://replica1:8001,http://replica2:8002
      - GATEWAY_URL=http://gateway:9000
    volumes:
      - ./replica3:/app
    networks:
      - inkraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  gateway:
    build:
      context: ./gateway
    container_name: inkraft-gateway
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - REPLICAS=http://replica1:8001,http://replica2:8002,http://replica3:8003
    volumes:
      - ./gateway:/app
      - ./frontend:/frontend
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - inkraft-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
